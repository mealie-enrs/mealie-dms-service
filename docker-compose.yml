services:
  dms-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DMS_IMAGE:-dms-app:local}
    container_name: dms-api
    environment:
      DMS_ROLE: api
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-dms}:${POSTGRES_PASSWORD:-dms}@postgres:5432/${POSTGRES_DB:-dms}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SWIFT_AUTH_URL: ${SWIFT_AUTH_URL:-}
      SWIFT_APP_CREDENTIAL_ID: ${SWIFT_APP_CREDENTIAL_ID:-}
      SWIFT_APP_CREDENTIAL_SECRET: ${SWIFT_APP_CREDENTIAL_SECRET:-}
      SWIFT_USER_UPLOADS_CONTAINER: ${SWIFT_USER_UPLOADS_CONTAINER:-proj26-user-uploads}
      SWIFT_TRAINING_CONTAINER: ${SWIFT_TRAINING_CONTAINER:-proj26-training-data}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-recipe_features}
      PREFECT_API_URL: ${PREFECT_API_URL:-http://prefect-server:4200/api}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      redpanda:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  dms-worker:
    image: ${DMS_IMAGE:-dms-app:local}
    container_name: dms-worker
    environment:
      DMS_ROLE: worker
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-dms}:${POSTGRES_PASSWORD:-dms}@postgres:5432/${POSTGRES_DB:-dms}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SWIFT_AUTH_URL: ${SWIFT_AUTH_URL:-}
      SWIFT_APP_CREDENTIAL_ID: ${SWIFT_APP_CREDENTIAL_ID:-}
      SWIFT_APP_CREDENTIAL_SECRET: ${SWIFT_APP_CREDENTIAL_SECRET:-}
      SWIFT_USER_UPLOADS_CONTAINER: ${SWIFT_USER_UPLOADS_CONTAINER:-proj26-user-uploads}
      SWIFT_TRAINING_CONTAINER: ${SWIFT_TRAINING_CONTAINER:-proj26-training-data}
      SWIFT_RECIPE1M_PREFIX: ${SWIFT_RECIPE1M_PREFIX:-recipe1m}
      KAGGLE_USERNAME: ${KAGGLE_USERNAME:-}
      KAGGLE_KEY: ${KAGGLE_KEY:-}
      KAGGLE_DOWNLOAD_DIR: ${KAGGLE_DOWNLOAD_DIR:-/tmp/dms-kaggle-downloads}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-recipe_features}
      PREFECT_API_URL: ${PREFECT_API_URL:-http://prefect-server:4200/api}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      ICEBERG_CATALOG_URI: ${ICEBERG_CATALOG_URI:-postgresql+psycopg2://dms:dms@postgres:5432/dms}
      ICEBERG_S3_ENDPOINT: ${ICEBERG_S3_ENDPOINT:-https://chi.uc.chameleoncloud.org:7480}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      ENABLE_SODA_CHECKS: ${ENABLE_SODA_CHECKS:-false}
      SODA_CONFIGURATION_FILE: ${SODA_CONFIGURATION_FILE:-quality/soda/configuration.yml}
      SODA_CHECKS_FILE: ${SODA_CHECKS_FILE:-quality/soda/checks.yml}
    volumes:
      - kaggle_downloads:/tmp/dms-kaggle-downloads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  dms-scheduler:
    image: ${DMS_IMAGE:-dms-app:local}
    container_name: dms-scheduler
    environment:
      DMS_ROLE: scheduler
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-dms}:${POSTGRES_PASSWORD:-dms}@postgres:5432/${POSTGRES_DB:-dms}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SWIFT_AUTH_URL: ${SWIFT_AUTH_URL:-}
      SWIFT_APP_CREDENTIAL_ID: ${SWIFT_APP_CREDENTIAL_ID:-}
      SWIFT_APP_CREDENTIAL_SECRET: ${SWIFT_APP_CREDENTIAL_SECRET:-}
      SWIFT_USER_UPLOADS_CONTAINER: ${SWIFT_USER_UPLOADS_CONTAINER:-proj26-user-uploads}
      SWIFT_TRAINING_CONTAINER: ${SWIFT_TRAINING_CONTAINER:-proj26-training-data}
      PREFECT_API_URL: ${PREFECT_API_URL:-http://prefect-server:4200/api}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: dms-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dms}
      POSTGRES_DB: ${POSTGRES_DB:-dms}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dms} -d ${POSTGRES_DB:-dms}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dms-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"
    restart: unless-stopped

  metabase:
    image: metabase/metabase:v0.56.3
    container_name: dms-metabase
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_SITE_NAME: DMS Metabase
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3000"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Vector store — online feature computation
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: dms-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Pipeline orchestration — Prefect server
  # ---------------------------------------------------------------------------
  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: dms-prefect-server
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: "sqlite+aiosqlite:////data/prefect.db"
      PREFECT_SERVER_API_HOST: "0.0.0.0"
      PREFECT_UI_API_URL: "http://192.5.87.45:4200/api"
    volumes:
      - prefect_data:/data
    ports:
      - "4200:4200"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Event streaming — Redpanda (Kafka-compatible)
  # ---------------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: dms-redpanda
    command:
      - redpanda start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    ports:
      - "19092:19092"   # Kafka external (host → container)
      - "18082:18082"   # Pandaproxy HTTP
      - "18081:18081"   # Schema registry
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  redpanda-console:
    image: redpandadata/console:v2.6.0
    container_name: dms-redpanda-console
    environment:
      CONFIG_FILEPATH: /app/config.yml
    volumes:
      - ./monitoring/redpanda-console.yml:/app/config.yml:ro
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Stream consumer — reads Redpanda events, writes rolling windows to Redis
  # Uses the main DMS image (confluent-kafka + redis already installed)
  # ---------------------------------------------------------------------------
  stream-consumer:
    image: ${DMS_IMAGE:-dms-app:local}
    container_name: dms-stream-consumer
    entrypoint: ["python", "-m", "dms.stream_consumer"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_CONSUMER_GROUP: dms-stream-consumer
      KAFKA_TOPICS: dms.uploads,dms.approvals,dms.inference
      REDIS_URL: redis://redis:6379/2
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Airflow — training data assembly DAG + event aggregation DAG
  # ---------------------------------------------------------------------------
  airflow-webserver:
    image: apache/airflow:2.9.1-python3.11
    container_name: dms-airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-dms}:${POSTGRES_PASSWORD:-dms}@postgres:5432/${POSTGRES_DB:-dms}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-dms-airflow-secret}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      DATABASE_URL: postgresql://dms:dms@postgres:5432/dms
      REDIS_URL: redis://redis:6379/2
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SWIFT_TRAINING_CONTAINER: ${SWIFT_TRAINING_CONTAINER:-proj26-training-data}
      ICEBERG_S3_ENDPOINT: ${ICEBERG_S3_ENDPOINT:-https://chi.uc.chameleoncloud.org:7480}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/requirements.txt:/opt/airflow/extra-requirements.txt:ro
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -c "
        pip install --quiet -r /opt/airflow/extra-requirements.txt &&
        airflow db upgrade &&
        airflow users create --username admin --firstname Admin --lastname User
          --role Admin --email admin@dms.local --password ${AIRFLOW_ADMIN_PASSWORD:-admin} 2>/dev/null || true &&
        airflow webserver --port 8085
      "
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8085:8085"
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.9.1-python3.11
    container_name: dms-airflow-scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-dms}:${POSTGRES_PASSWORD:-dms}@postgres:5432/${POSTGRES_DB:-dms}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-dms-airflow-secret}
      DATABASE_URL: postgresql://dms:dms@postgres:5432/dms
      REDIS_URL: redis://redis:6379/2
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SWIFT_TRAINING_CONTAINER: ${SWIFT_TRAINING_CONTAINER:-proj26-training-data}
      ICEBERG_S3_ENDPOINT: ${ICEBERG_S3_ENDPOINT:-https://chi.uc.chameleoncloud.org:7480}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/requirements.txt:/opt/airflow/extra-requirements.txt:ro
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -c "
        pip install --quiet -r /opt/airflow/extra-requirements.txt &&
        airflow db upgrade &&
        airflow scheduler
      "
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Data quality — Soda (isolated to avoid opentelemetry conflict with Prefect)
  # Run on demand: docker compose --profile quality run dms-soda
  # ---------------------------------------------------------------------------
  dms-soda:
    build:
      context: .
      dockerfile: Dockerfile.soda
    image: dms-soda:local
    container_name: dms-soda
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-dms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dms}
      POSTGRES_DB: ${POSTGRES_DB:-dms}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - quality
    restart: "no"

  # ---------------------------------------------------------------------------
  # Data transformation — dbt
  # ---------------------------------------------------------------------------
  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    image: dms-dbt:local
    container_name: dms-dbt
    environment:
      DBT_POSTGRES_HOST: postgres
      DBT_POSTGRES_PORT: "5432"
      DBT_POSTGRES_USER: ${POSTGRES_USER:-dms}
      DBT_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dms}
      DBT_POSTGRES_DB: ${POSTGRES_DB:-dms}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - transforms
    restart: "no"

  # ---------------------------------------------------------------------------
  # Monitoring stack
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: dms-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: dms-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: dms-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: dms-cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: dms-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: dms-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-dms}:${POSTGRES_PASSWORD:-dms}@postgres:5432/${POSTGRES_DB:-dms}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  kaggle_downloads:
  metabase_data:
  prometheus_data:
  grafana_data:
  qdrant_data:
  prefect_data:
  redpanda_data:
  airflow_logs:
