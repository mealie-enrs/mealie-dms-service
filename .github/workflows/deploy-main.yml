name: Deploy DMS on main merge

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "dms/**"
      - "scripts/**"
      - "Dockerfile"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "tests/**"
      - "infra/k8s/**"
      - ".github/workflows/deploy-main.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: dms-prod-deploy
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/nidhish1/dms-app
  NAMESPACE: dms

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dms
          POSTGRES_PASSWORD: dms
          POSTGRES_DB: dms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dms -d dms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Start API (foreground worker)
        env:
          DATABASE_URL: postgresql+psycopg://dms:dms@localhost:5432/dms
        run: |
          python -m uvicorn dms.api:app --host 127.0.0.1 --port 8000 &
          echo "$!" > /tmp/dms-uvicorn.pid

      - name: Run integration tests
        env:
          DMS_API_URL: http://127.0.0.1:8000
        run: pytest tests/integration -v

      - name: Stop API
        if: always()
        run: |
          if test -f /tmp/dms-uvicorn.pid; then
            kill "$(cat /tmp/dms-uvicorn.pid)" 2>/dev/null || true
          fi

  build-and-deploy:
    needs: integration-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.34.1

      - name: Write kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Validate kubeconfig
        run: |
          test -s "$KUBECONFIG"
          kubectl config get-contexts
          kubectl cluster-info

      - name: Deploy new image
        run: |
          kubectl -n "$NAMESPACE" set image deployment/dms-api dms-api="$IMAGE_NAME:${GITHUB_SHA}"
          kubectl -n "$NAMESPACE" set image deployment/dms-worker dms-worker="$IMAGE_NAME:${GITHUB_SHA}"
          kubectl -n "$NAMESPACE" set image deployment/dms-scheduler dms-scheduler="$IMAGE_NAME:${GITHUB_SHA}"
          kubectl -n "$NAMESPACE" rollout status deployment/dms-api --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deployment/dms-worker --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deployment/dms-scheduler --timeout=300s
