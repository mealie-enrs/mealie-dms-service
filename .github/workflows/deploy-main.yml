name: Deploy DMS on main merge

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "dms/**"
      - "scripts/**"
      - "Dockerfile"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "docker-compose.yml"
      - "deploy.sh"
      - "tests/**"
      - ".github/workflows/deploy-main.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: dms-prod-deploy
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/mealie-enrs/dms-app
  DEPLOY_HOST: 192.5.87.45
  DEPLOY_USER: cc
  APP_DIR: ~/mealie-dms-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Build and push image to GHCR
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # 2. SSH into node — pull new image, restart containers
      # -----------------------------------------------------------------------
      - name: Deploy to CPU node via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_NAME,GITHUB_SHA
          script: |
            set -euo pipefail

            echo "==> Logging in to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u "${{ github.actor }}" --password-stdin

            echo "==> Pulling new image: $IMAGE_NAME:$GITHUB_SHA"
            docker pull "$IMAGE_NAME:$GITHUB_SHA"

            echo "==> Tagging as dms-app:local so compose picks it up ..."
            docker tag "$IMAGE_NAME:$GITHUB_SHA" dms-app:local

            echo "==> Restarting containers with new image ..."
            cd ${{ env.APP_DIR }}
            docker compose up -d --no-build --force-recreate

            echo "==> Waiting for API to be healthy ..."
            for i in $(seq 1 24); do
              if curl -sf http://localhost:8000/healthz >/dev/null; then
                echo "API healthy."
                exit 0
              fi
              sleep 5
            done
            echo "ERROR: API did not become healthy after 120s"
            docker compose logs dms-api --tail 50
            exit 1
