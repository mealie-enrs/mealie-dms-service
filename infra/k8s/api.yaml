apiVersion: v1
kind: Service
metadata:
  name: dms-api
  namespace: dms
spec:
  type: NodePort
  selector:
    app: dms-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dms-api
  namespace: dms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dms-api
  template:
    metadata:
      labels:
        app: dms-api
    spec:
      containers:
        - name: dms-api
          image: ghcr.io/your-org/dms-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DMS_ROLE
              value: api
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: CELERY_RESULT_BACKEND
            - name: SWIFT_AUTH_URL
              valueFrom:
                secretKeyRef:
                  name: dms-secrets
                  key: SWIFT_AUTH_URL
            - name: SWIFT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dms-secrets
                  key: SWIFT_USERNAME
            - name: SWIFT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dms-secrets
                  key: SWIFT_PASSWORD
            - name: SWIFT_USER_UPLOADS_CONTAINER
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: SWIFT_USER_UPLOADS_CONTAINER
            - name: SWIFT_TRAINING_CONTAINER
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: SWIFT_TRAINING_CONTAINER
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dms-secrets
                  key: DATABASE_PASSWORD
            - name: DATABASE_URL
              value: postgresql+psycopg://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
