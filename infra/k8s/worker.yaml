apiVersion: apps/v1
kind: Deployment
metadata:
  name: dms-worker
  namespace: dms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dms-worker
  template:
    metadata:
      labels:
        app: dms-worker
    spec:
      containers:
        - name: dms-worker
          image: ghcr.io/nidhish1/dms-app:latest
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          env:
            - name: DMS_ROLE
              value: worker
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: CELERY_RESULT_BACKEND
            - name: SWIFT_AUTH_URL
              valueFrom:
                secretKeyRef:
                  name: dms-secrets
                  key: SWIFT_AUTH_URL
            - name: SWIFT_APP_CREDENTIAL_ID
              valueFrom:
                secretKeyRef:
                  name: dms-secrets
                  key: SWIFT_APP_CREDENTIAL_ID
            - name: SWIFT_APP_CREDENTIAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: dms-secrets
                  key: SWIFT_APP_CREDENTIAL_SECRET
            - name: SWIFT_USER_UPLOADS_CONTAINER
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: SWIFT_USER_UPLOADS_CONTAINER
            - name: SWIFT_TRAINING_CONTAINER
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: SWIFT_TRAINING_CONTAINER
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: dms-config
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dms-secrets
                  key: DATABASE_PASSWORD
            - name: DATABASE_URL
              value: postgresql+psycopg://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)
            - name: SWIFT_RECIPE1M_PREFIX
              value: recipe1m
            - name: KAGGLE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dms-secrets
                  key: KAGGLE_USERNAME
            - name: KAGGLE_KEY
              valueFrom:
                secretKeyRef:
                  name: dms-secrets
                  key: KAGGLE_KEY
            - name: KAGGLE_DOWNLOAD_DIR
              value: /tmp/dms-kaggle-downloads
