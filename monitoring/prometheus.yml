global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Host CPU, memory, disk, network
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  # Docker container metrics (CPU, memory, network per container)
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  # DMS API — FastAPI app metrics
  - job_name: dms-api
    static_configs:
      - targets: ['dms-api:8000']
    metrics_path: /metrics

  # DMS business metrics derived from product state
  - job_name: dms-business
    static_configs:
      - targets: ['dms-api:8000']
    metrics_path: /metrics/business

  # Mealie ML feedback metrics exposed on the host service port
  - job_name: mealie-ml
    static_configs:
      - targets: ['host.docker.internal:9000']
    metrics_path: /api/ml/metrics

  # Redis metrics
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  # Postgres metrics
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redpanda Kafka broker metrics
  - job_name: redpanda
    static_configs:
      - targets: ['redpanda:9644']
    metrics_path: /public_metrics

  # Qdrant vector store metrics (available once qdrant container is running)
  - job_name: qdrant
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: /metrics
    metric_relabel_configs:
      - source_labels: [__name__]
        action: keep
        regex: qdrant_.*

  # Model-serve production lane
  - job_name: mms-production
    static_configs:
      - targets: ['192.5.87.188:30608']
    metrics_path: /metrics

  # Model-serve canary lane
  - job_name: mms-canary
    static_configs:
      - targets: ['192.5.87.188:30609']
    metrics_path: /metrics

  # Rollout router
  - job_name: mms-router
    static_configs:
      - targets: ['192.5.87.188:30610']
    metrics_path: /metrics
